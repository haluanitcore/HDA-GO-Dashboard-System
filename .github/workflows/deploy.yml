name: Production Deployment to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH Command
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/hda-go
            git pull origin main
            
            # 1. Update & Build NestJS Backend
            cd /var/www/hda-go/hda-go-backend
            npm install
            npx prisma generate
            npx prisma db push
            npm run build
            pm2 restart hda-go-backend || pm2 start dist/src/main.js --name "hda-go-backend"
            
            # 2. Update & Build NextJS Frontend
            cd /var/www/hda-go/hda-go-frontend
            npm install
            npm run build
            pm2 restart hda-go-frontend || pm2 start npm --name "hda-go-frontend" -- start -- -p 3000
            
            # 3. Save PM2 configurations
            pm2 save
            
            echo "🚀 Deployment successfully completed!"
